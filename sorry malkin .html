<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm So Sorry</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Full screen tulip background */
        .bg-image {
            background-image: url('https://images.unsplash.com/photo-1520323232431-6420ce094592?q=80&w=2070&auto=format&fit=crop'); 
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            filter: blur(3px);
            position: fixed;
            width: 100%;
            z-index: 1;
        }

        /* Centered Sorry Card */
        .sorry-card {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 15px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 85%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 { color: #d14d72; font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; line-height: 1.6; color: #555; }

        /* Floating Animation Styles */
        .floating {
            position: fixed;
            top: -50px;
            z-index: 5;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Bottom Inbox Button */
        .inbox-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .inbox-btn {
            background: #d14d72;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(209, 77, 114, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inbox-btn:hover { background: #b03a5a; transform: scale(1.05); }

        /* The "I Love You" Pop-up (Hidden by default) */
        .overlay {
            display: none; /* Hidden */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .love-popup {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px #ff4d6d;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .love-popup h2 {
            color: #ff4d6d;
            font-size: 2.5rem;
            margin: 0;
        }

        .close-btn {
            margin-top: 20px;
            background: #eee;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="sorry-card">
        <h1>I'm Sorry</h1>
        <p>I know I messed up, and I hate that I made you feel this way.</p>
        <p> I'm really sorry my malkin ji  </p>
        <p>Can we talk when you're ready?</p>
        <div style="color: #d14d72; font-size: 2rem;">❤</div>
    </div>

    <div class="inbox-container">
        <button class="inbox-btn" onclick="openInbox()">
            <span>📩</span> Open Your Inbox
        </button>
    </div>

    <div class="overlay" id="loveOverlay">
        <div class="love-popup">
            <h2>💖 I LOVE YOU SOO MUCH 💖</h2>
            <p>More than words can say.</p>
            <button class="close-btn" onclick="closeInbox()">Close</button>
        </div>
    </div>

    <script>
        // Function to create floating hearts and tulips
        function createEmoji() {
            const emojis = ['🌷', '❤️', '🌸', '💖'];
            const e = document.createElement('div');
            e.className = 'floating';
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = Math.random() * 20 + 20 + 'px';
            e.style.opacity = Math.random();
            
            document.body.appendChild(e);

            e.style.animationDuration = (Math.random() * 3 + 4) + 's';

            setTimeout(() => { e.remove(); }, 7000);
        }

        setInterval(createEmoji, 300);

        // Pop-up logic
        function openInbox() {
            document.getElementById('loveOverlay').style.display = 'flex';
        }

        function closeInbox() {
            document.getElementById('loveOverlay').style.display = 'none';
        }
    </script>

</body>
</html>
